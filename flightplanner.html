<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flight Planner PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

.panel {
  position:absolute;
  top:10px; left:10px;
  background:#fff;
  padding:10px;
  border-radius:8px;
  z-index:999;
  width:260px;
  font-size:12px;
}

button {
  width:100%;
  margin-top:5px;
  padding:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <b>Flight Planner PRO</b><br><br>

  Altitude (m):
  <input type="number" id="alt" value="100"><br><br>

  Speed (m/s):
  <input type="number" id="speed" value="8"><br><br>

  Spacing (m):
  <input type="number" id="spacing" value="40"><br><br>

  <button onclick="generateGrid()">Generate Grid</button>
  <button onclick="exportCSVLitchi()">Export Litchi CSV</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>
var map = L.map('map').setView([0.5,101.45], 15);

var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

L.control.layers({"OSM":osm,"Satellite":satellite}).addTo(map);

var drawnItems = new L.FeatureGroup().addTo(map);
var gridLayer = new L.FeatureGroup().addTo(map);

map.addControl(new L.Control.Draw({
  edit: { featureGroup: drawnItems },
  draw: { polygon:true, polyline:false, rectangle:false, circle:false, marker:false }
}));

map.on(L.Draw.Event.CREATED, function(e){
  drawnItems.clearLayers();
  gridLayer.clearLayers();
  drawnItems.addLayer(e.layer);
});

var waypoints = [];

function generateGrid(){
  gridLayer.clearLayers();
  waypoints = [];

  var polyLayer = drawnItems.getLayers()[0];
  if(!polyLayer) return alert("Gambar polygon dulu!");

  var alt = parseFloat(document.getElementById('alt').value);
  var spacing = parseFloat(document.getElementById('spacing').value);

  var polygon = polyLayer.toGeoJSON();
  var bbox = turf.bbox(polygon);

  var step = spacing / 111320;
  var y = bbox[1];
  var toggle = false;

  while(y <= bbox[3]){
    var line = turf.lineString([[bbox[0], y],[bbox[2], y]]);
    var clipped = turf.lineIntersect(polygon, line);

    if(clipped.features.length >= 2){
      var pts = clipped.features.map(f=>f.geometry.coordinates);
      pts.sort((a,b)=>a[0]-b[0]);
      if(toggle) pts.reverse();

      for(let i=0;i<pts.length;i++){
        let heading = 90;
        if(i < pts.length-1){
          let dx = pts[i+1][0] - pts[i][0];
          let dy = pts[i+1][1] - pts[i][1];
          heading = Math.atan2(dx, dy) * 180/Math.PI;
        }

        waypoints.push({
          lat: pts[i][1],
          lng: pts[i][0],
          alt: alt,
          heading: heading
        });
      }

      var latlngs = pts.map(p=>[p[1],p[0]]);
      L.polyline(latlngs).addTo(gridLayer);
      toggle = !toggle;
    }

    y += step;
  }

  estimateFlight();
}

function estimateFlight(){
  let speed = parseFloat(document.getElementById('speed').value);
  let distance = 0;

  for(let i=1;i<waypoints.length;i++){
    distance += map.distance([waypoints[i-1].lat, waypoints[i-1].lng],[waypoints[i].lat, waypoints[i].lng]);
  }

  let time = distance / speed;
  alert("Estimasi flight: " + (time/60).toFixed(2) + " menit");
}

function exportCSVLitchi(){
  if(waypoints.length===0) return alert("Generate grid dulu!");

  var csv = "latitude,longitude,altitude(m),heading(deg),speed(m/s)\n";

  let speed = document.getElementById('speed').value;

  waypoints.forEach(w=>{
    csv += `${w.lat},${w.lng},${w.alt},${w.heading},${speed}\n`;
  });

  downloadFile("litchi_mission.csv", csv);
}

function downloadFile(name, content){
  var blob = new Blob([content], {type:"text/plain"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}
</script>

</body>
</html>
