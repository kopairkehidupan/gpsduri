<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Flight Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

.panel {
  position:absolute;
  top:10px; left:10px;
  background:#fff;
  padding:10px;
  border-radius:8px;
  z-index:999;
  width:230px;
  font-size:12px;
}

button {
  width:100%;
  margin-top:5px;
  padding:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <b>Flight Planner</b><br><br>

  Altitude (m):
  <input type="number" id="alt" value="100"><br><br>

  Spacing (m):
  <input type="number" id="spacing" value="40"><br><br>

  <button onclick="generateGrid()">Generate Grid</button>
  <button onclick="exportKML()">Export KML</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

<script>
// Base layers
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
var satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  subdomains:['mt0','mt1','mt2','mt3']
});
var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
var none = L.tileLayer('');

osm.addTo(map);

var baseMaps = {
  "OSM": osm,
  "Topo": topo,
  "Satellite": satellite,
  "Dark": dark,
  "None": none
};

L.control.layers(baseMaps).addTo(map);

var drawnItems = new L.FeatureGroup().addTo(map);
var gridLayer = new L.FeatureGroup().addTo(map);

map.addControl(new L.Control.Draw({
  edit: { featureGroup: drawnItems },
  draw: { polygon:true, polyline:false, rectangle:false, circle:false, marker:false }
}));

map.on(L.Draw.Event.CREATED, function(e){
  drawnItems.clearLayers();
  gridLayer.clearLayers();
  drawnItems.addLayer(e.layer);
});

var waypoints = [];

function generateGrid(){
  gridLayer.clearLayers();
  waypoints = [];

  var polyLayer = drawnItems.getLayers()[0];
  if(!polyLayer) return alert("Gambar polygon dulu!");

  var alt = parseFloat(document.getElementById('alt').value);
  var spacing = parseFloat(document.getElementById('spacing').value);

  var polygon = polyLayer.toGeoJSON();
  var bbox = turf.bbox(polygon);

  var lines = [];
  var step = spacing / 111320; // meter to degree approx

  var y = bbox[1];
  var toggle = false;

  while(y <= bbox[3]){
    var line = turf.lineString([
      [bbox[0], y],
      [bbox[2], y]
    ]);

    var clipped = turf.lineIntersect(polygon, line);

    if(clipped.features.length >= 2){
      var pts = clipped.features.map(f=>f.geometry.coordinates);

      pts.sort((a,b)=>a[0]-b[0]);

      if(toggle) pts.reverse();

      for(let i=0;i<pts.length;i++){
        waypoints.push({
          lat: pts[i][1],
          lng: pts[i][0],
          alt: alt
        });
      }

      var latlngs = pts.map(p=>[p[1],p[0]]);
      L.polyline(latlngs,{color:'red'}).addTo(gridLayer);

      toggle = !toggle;
    }

    y += step;
  }

  alert("Grid berhasil dibuat: " + waypoints.length + " waypoint");
}

function exportKML(){
  if(waypoints.length===0) return alert("Generate grid dulu!");

  var kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
<Placemark>
<LineString>
<coordinates>
`;

  waypoints.forEach(w=>{
    kml += `${w.lng},${w.lat},${w.alt}\n`;
  });

  kml += `
</coordinates>
</LineString>
</Placemark>
</Document>
</kml>`;

  downloadFile("flight_plan.kml", kml);
}

function exportCSV(){
  if(waypoints.length===0) return alert("Generate grid dulu!");

  var csv = "lat,lng,alt\n";

  waypoints.forEach(w=>{
    csv += `${w.lat},${w.lng},${w.alt}\n`;
  });

  downloadFile("flight_plan.csv", csv);
}

function downloadFile(name, content){
  var blob = new Blob([content], {type:"text/plain"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}
</script>

</body>
</html>
